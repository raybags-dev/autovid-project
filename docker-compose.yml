services:
  # ── Redis (job queue broker) ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    mem_limit: 128m
    expose:
      - "6379"

  # ── Celery worker (processes video jobs one at a time, FIFO) ──────────
  celery-worker:
    build: ./backend
    restart: unless-stopped
    mem_limit: 1600m
    env_file: .env
    environment:
      - APP_ENV=production
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - video_output:/app/output
      - ./backend/youtube_token.json:/app/youtube_token.json
    depends_on:
      - redis
    command: python -m celery -A workers.celery_worker worker --loglevel=info --concurrency=1 -Q autovid

  # ── 2 Backend instances (API only — no pipeline work) ─────────────────
  backend-1:
    build: ./backend
    restart: unless-stopped
    mem_limit: 1400m
    env_file: .env
    environment:
      - APP_ENV=production
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - video_output:/app/output
      - ./backend/youtube_token.json:/app/youtube_token.json
    depends_on:
      - redis
    expose:
      - "8000"

  backend-2:
    build: ./backend
    restart: unless-stopped
    mem_limit: 1400m
    env_file: .env
    environment:
      - APP_ENV=production
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - video_output:/app/output
      - ./backend/youtube_token.json:/app/youtube_token.json
    depends_on:
      - redis
    expose:
      - "8000"

  # ── Nginx load balancer (backend API) ────────────────────────────────
  nginx-lb:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./nginx-lb.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-1
      - backend-2

  # ── 4lifemystery.com frontend (admin app) ────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - nginx-lb

  # ── async-mode.com frontend (public SaaS) ────────────────────────────
  frontend-async:
    build: ./frontend-async
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      - nginx-lb

  # ── nginx-router (routes by Host header to correct frontend) ─────────
  nginx-router:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx-router.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - frontend-async

volumes:
  video_output:

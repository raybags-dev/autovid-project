version: "3.9"

services:
  # ── 4 Backend instances ──────────────────────────────────────────
  backend-1:
    build: ./backend
    restart: unless-stopped
    mem_limit: 800m
    env_file: .env
    volumes:
      - video_output:/app/output
      - ./backend/token.json:/app/token.json:ro
    expose:
      - "8000"

  backend-2:
    build: ./backend
    restart: unless-stopped
    mem_limit: 800m
    env_file: .env
    volumes:
      - video_output:/app/output
      - ./backend/token.json:/app/token.json:ro
    expose:
      - "8000"

  backend-3:
    build: ./backend
    restart: unless-stopped
    mem_limit: 800m
    env_file: .env
    volumes:
      - video_output:/app/output
      - ./backend/token.json:/app/token.json:ro
    expose:
      - "8000"

  backend-4:
    build: ./backend
    restart: unless-stopped
    mem_limit: 800m
    env_file: .env
    volumes:
      - video_output:/app/output
      - ./backend/token.json:/app/token.json:ro
    expose:
      - "8000"

  # ── Nginx load balancer across 4 backends ────────────────────────
  nginx-lb:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - ./nginx-lb.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend-1
      - backend-2
      - backend-3
      - backend-4

  # ── Frontend ─────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - nginx-lb

volumes:
  video_output:

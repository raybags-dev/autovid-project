name: Deploy to Production

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: false   # never cancel a live deploy

jobs:
  # ── Gate: re-run all tests before any deploy lands ───────────────────────────
  backend-tests:
    name: Backend — Tests (pre-deploy gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-test.txt

      - name: Install test dependencies
        run: pip install -r backend/requirements-test.txt

      - name: Run tests
        env:
          SECRET_KEY: ci-test-secret-key-not-for-production
          SUPABASE_URL: https://test.supabase.co
          SUPABASE_SERVICE_KEY: test-service-key
          SUPABASE_ANON_KEY: test-anon-key
          GROQ_API_KEY: test-groq-key
          ELEVENLABS_API_KEY: test-elevenlabs-key
          PEXELS_API_KEY: test-pexels-key
          AUTOVID_LICENSE_KEY: ${{ secrets.AUTOVID_LICENSE_KEY }}
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short --no-header -q

  frontend-build:
    name: Frontend — Build check (4lifemystery.com)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Build
        env:
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}
          VITE_SUPPORT_EMAIL: ${{ secrets.VITE_SUPPORT_EMAIL }}
          VITE_CONTACT_EMAIL: ${{ secrets.VITE_CONTACT_EMAIL }}
          VITE_YOUTUBE_URL: ${{ secrets.VITE_YOUTUBE_URL }}
          VITE_TIKTOK_URL: ${{ secrets.VITE_TIKTOK_URL }}
          VITE_SPOTIFY_URL: ${{ secrets.VITE_SPOTIFY_URL }}
          VITE_SPOTIFY_SHOW_ID: ${{ secrets.VITE_SPOTIFY_SHOW_ID }}
        run: cd frontend && npm run build

  frontend-async-build:
    name: Frontend — Build check (async-mode.com)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend-async/package-lock.json

      - name: Install dependencies
        run: cd frontend-async && npm install

      - name: Build
        env:
          VITE_ASYNC_APP_NAME: ${{ secrets.VITE_ASYNC_APP_NAME }}
          VITE_ASYNC_SUPPORT_EMAIL: ${{ secrets.VITE_ASYNC_SUPPORT_EMAIL }}
        run: cd frontend-async && npm run build

  # ── Deploy: SSH to VPS, pull, rebuild ─────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build, frontend-async-build]
    environment: production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          VITE_APP_NAME: ${{ secrets.VITE_APP_NAME }}
          VITE_APP_URL: ${{ secrets.VITE_APP_URL }}
          VITE_SUPPORT_EMAIL: ${{ secrets.VITE_SUPPORT_EMAIL }}
          VITE_CONTACT_EMAIL: ${{ secrets.VITE_CONTACT_EMAIL }}
          VITE_YOUTUBE_URL: ${{ secrets.VITE_YOUTUBE_URL }}
          VITE_TIKTOK_URL: ${{ secrets.VITE_TIKTOK_URL }}
          VITE_SPOTIFY_URL: ${{ secrets.VITE_SPOTIFY_URL }}
          VITE_SPOTIFY_SHOW_ID: ${{ secrets.VITE_SPOTIFY_SHOW_ID }}
          VITE_ASYNC_APP_NAME: ${{ secrets.VITE_ASYNC_APP_NAME }}
          VITE_ASYNC_SUPPORT_EMAIL: ${{ secrets.VITE_ASYNC_SUPPORT_EMAIL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          envs: VITE_APP_NAME,VITE_APP_URL,VITE_SUPPORT_EMAIL,VITE_CONTACT_EMAIL,VITE_YOUTUBE_URL,VITE_TIKTOK_URL,VITE_SPOTIFY_URL,VITE_SPOTIFY_SHOW_ID,VITE_ASYNC_APP_NAME,VITE_ASYNC_SUPPORT_EMAIL,RESEND_API_KEY
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/autovid

            echo "── Pulling latest code ──"
            git remote set-url origin https://github.com/raybags-dev/autovid-project.git
            GIT_TERMINAL_PROMPT=0 git -c credential.helper= fetch origin main
            git reset --hard origin/main

            echo "── Writing RESEND_API_KEY to .env ──"
            python3 -c 'import os,pathlib;f=pathlib.Path(".env");f.touch();lines=[l for l in f.read_text().splitlines(keepends=True) if not l.startswith("RESEND_API_KEY=")];lines.append("RESEND_API_KEY="+os.environ.get("RESEND_API_KEY","")+"\n");f.write_text("".join(lines))'

            echo "── Rebuilding containers ──"
            docker compose build \
              --build-arg VITE_APP_NAME="${VITE_APP_NAME:-}" \
              --build-arg VITE_APP_URL="${VITE_APP_URL:-}" \
              --build-arg VITE_SUPPORT_EMAIL="${VITE_SUPPORT_EMAIL:-}" \
              --build-arg VITE_CONTACT_EMAIL="${VITE_CONTACT_EMAIL:-}" \
              --build-arg VITE_YOUTUBE_URL="${VITE_YOUTUBE_URL:-}" \
              --build-arg VITE_TIKTOK_URL="${VITE_TIKTOK_URL:-}" \
              --build-arg VITE_SPOTIFY_URL="${VITE_SPOTIFY_URL:-}" \
              --build-arg VITE_SPOTIFY_SHOW_ID="${VITE_SPOTIFY_SHOW_ID:-}" \
              frontend
            docker compose build \
              --build-arg VITE_ASYNC_APP_NAME="${VITE_ASYNC_APP_NAME:-}" \
              --build-arg VITE_ASYNC_SUPPORT_EMAIL="${VITE_ASYNC_SUPPORT_EMAIL:-}" \
              frontend-async
            docker compose up -d --remove-orphans

            echo "── Waiting for backend health check ──"
            for i in $(seq 1 12); do
              status=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health 2>/dev/null || echo 000)
              if [ "$status" = "200" ]; then
                echo "✓ Backend healthy (attempt $i)"
                break
              fi
              if [ "$i" -eq 12 ]; then
                echo "✗ Backend failed to become healthy after 60s"
                exit 1
              fi
              echo "  waiting... ($i/12)"
              sleep 5
            done

            echo "── Pruning old images ──"
            docker image prune -f --filter "until=48h" || true

            echo "✓ Deploy complete"

# nginx-router — routes traffic by Host header to the correct frontend container.
# 4lifemystery.com  →  frontend:80  (existing admin app)
# async-mode.com    →  frontend-async:80  (public SaaS site)

server {
    listen 80;
    server_name 4lifemystery.com www.4lifemystery.com;

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 500m;
    }
}

server {
    listen 80;
    server_name async-mode.com www.async-mode.com;

    location / {
        proxy_pass http://frontend-async:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# Catch-all — any other Host falls through to the main frontend
server {
    listen 80 default_server;
    location / {
        proxy_pass http://frontend:80;
        proxy_set_header Host $host;
    }
}

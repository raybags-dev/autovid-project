# nginx-router — routes traffic by Host header to the correct frontend container.
# Uses Docker's internal DNS resolver (127.0.0.11) with variable upstreams so
# hostname resolution is deferred to request time — avoids startup failures when
# upstream containers aren't ready yet.

resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name 4lifemystery.com www.4lifemystery.com;

    location / {
        set $up http://frontend;
        proxy_pass $up;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        client_max_body_size 500m;
    }
}

server {
    listen 80;
    server_name async-mode.com www.async-mode.com;

    location / {
        set $up http://frontend-async;
        proxy_pass $up;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}

# Catch-all — any other Host falls through to the main frontend
server {
    listen 80 default_server;
    location / {
        set $up http://frontend;
        proxy_pass $up;
        proxy_set_header Host $host;
    }
}

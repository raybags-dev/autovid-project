server {
    listen 80;
    server_name www.4lifemystery.com;
    return 301 http://4lifemystery.com$request_uri;
}

server {
    listen 80;
    server_name 4lifemystery.com 157.180.67.199;
    root /usr/share/nginx/html;
    index index.html;

    # Serve .txt files (TikTok/domain verification) as raw static
    location ~* \.txt$ {
        try_files $uri =404;
        default_type text/plain;
    }

    # Proxy API calls to the load balancer
    location /api/ {
        proxy_pass http://nginx-lb:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # React router — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}

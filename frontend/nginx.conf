server {
    listen 80;
    server_name www.your-domain.com;
    return 301 https://your-domain.com$request_uri;
}

server {
    listen 80;
    # Replace with your actual domain and server IP
    server_name your-domain.com _;
    root /usr/share/nginx/html;
    index index.html;

    # Serve .txt files (TikTok/domain verification) as raw static
    location ~* \.txt$ {
        try_files $uri =404;
        default_type text/plain;
    }

    client_max_body_size 500m;

    client_body_timeout 600s;

    # Proxy API calls to the load balancer
    location /api/ {
        proxy_pass http://nginx-lb:80/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 10s;
        client_max_body_size 500m;
    }

    # Proxy backend-served static assets (videos, stick-figure clips)
    # These are NOT in the frontend container — they live on the backend volume
    location /local-videos/ {
        proxy_pass http://nginx-lb:80/local-videos/;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }

    location /stickfigures-assets/ {
        proxy_pass http://nginx-lb:80/stickfigures-assets/;
        proxy_set_header Host $host;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Static legal pages — serve at canonical (no trailing slash) URLs
    # Trailing-slash versions 301 to the canonical to match canonical tag + sitemap
    location = /privacy-policy {
        try_files /privacy-policy/index.html =404;
    }
    location = /privacy-policy/ {
        return 301 /privacy-policy;
    }
    location = /terms-of-service {
        try_files /terms-of-service/index.html =404;
    }
    location = /terms-of-service/ {
        return 301 /terms-of-service;
    }

    # React router — all other routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
